server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5440}/${DB_NAME:cricket_db}
    username: ${DB_USERNAME:cricket_user}
    password: ${DB_PASSWORD:cricket_pass}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate


app:
  ipl:
    data-path: ${IPL_DATA_PATH:C:/Users/deepa/Desktop/ipl_json}
    import-enabled: ${IPL_IMPORT_ENABLED:false}
